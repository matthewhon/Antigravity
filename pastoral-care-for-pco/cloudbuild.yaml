steps:
- name: 'gcr.io/cloud-builders/docker'
  dir: 'pastoral-care-for-pco'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}', '.']

- name: 'gcr.io/cloud-builders/docker'
  dir: 'pastoral-care-for-pco'
  args: ['push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}']

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  dir: 'pastoral-care-for-pco'
  args:
    - 'run'
    - 'deploy'
    - '${_SERVICE_NAME}'
    - '--image'
    - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}'
    - '--region'
    - '${_REGION}'
    - '--platform'
    - 'managed'
    - '--allow-unauthenticated'
    - '--port'
    - '8080'
    - '--timeout'
    - '300s'

serviceAccount: 'projects/$PROJECT_ID/serviceAccounts/511453050214-compute@developer.gserviceaccount.com'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _SERVICE_NAME: pastoral-care-for-pco
  _REGION: us-central1

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}'
